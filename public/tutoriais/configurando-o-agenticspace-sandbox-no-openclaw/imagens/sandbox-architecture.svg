<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="hostGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dockerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="agentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="400" fill="#f8fafc" rx="10"/>
  
  <!-- Host System -->
  <rect x="30" y="30" width="740" height="340" fill="none" stroke="#94a3b8" stroke-width="2" rx="10" stroke-dasharray="5,5"/>
  <text x="50" y="55" font-family="Arial, sans-serif" font-size="14" fill="#64748b">Host System</text>
  
  <!-- Docker Engine -->
  <rect x="50" y="80" width="700" height="280" fill="url(#dockerGrad)" rx="8" opacity="0.1"/>
  <rect x="50" y="80" width="700" height="280" fill="none" stroke="#0891b2" stroke-width="2" rx="8"/>
  <text x="70" y="105" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0891b2">Docker Engine</text>
  
  <!-- Container -->
  <rect x="100" y="130" width="600" height="210" fill="url(#agentGrad)" rx="8" opacity="0.15"/>
  <rect x="100" y="130" width="600" height="210" fill="none" stroke="#059669" stroke-width="2" rx="8"/>
  <text x="120" y="155" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#059669">AgenticSpace Sandbox Container</text>
  
  <!-- Tools inside container -->
  <rect x="130" y="180" width="160" height="60" fill="white" stroke="#10b981" stroke-width="1" rx="5"/>
  <text x="210" y="205" font-family="Arial, sans-serif" font-size="12" fill="#374151" text-anchor="middle">CLI Tools</text>
  <text x="210" y="225" font-family="Arial, sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">curl, wget, jq, htmlq</text>
  
  <rect x="310" y="180" width="160" height="60" fill="white" stroke="#10b981" stroke-width="1" rx="5"/>
  <text x="390" y="205" font-family="Arial, sans-serif" font-size="12" fill="#374151" text-anchor="middle">Python Tools</text>
  <text x="390" y="225" font-family="Arial, sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">scrape-url, extract-data</text>
  
  <rect x="490" y="180" width="160" height="60" fill="white" stroke="#10b981" stroke-width="1" rx="5"/>
  <text x="570" y="205" font-family="Arial, sans-serif" font-size="12" fill="#374151" text-anchor="middle">Libraries</text>
  <text x="570" y="225" font-family="Arial, sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">Scrapy, BeautifulSoup</text>
  
  <!-- Bind mounts -->
  <path d="M 100 280 L 50 280 L 50 320 L 100 320" fill="none" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="130" y="260" width="540" height="70" fill="#fef3c7" stroke="#f59e0b" stroke-width="1" rx="5"/>
  <text x="400" y="285" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#92400e" text-anchor="middle">Bind Mounts</text>
  <text x="400" y="305" font-family="Arial, sans-serif" font-size="10" fill="#92400e" text-anchor="middle">/skills (ro) | /plugins (ro) | /workspace/output (rw)</text>
  <text x="400" y="320" font-family="Arial, sans-serif" font-size="10" fill="#92400e" text-anchor="middle">Shared directories with host system</text>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#f59e0b" />
    </marker>
  </defs>
</svg>
