<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="step1Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="step2Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="step3Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="step4Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="500" fill="#f8fafc" rx="10"/>
  
  <!-- Title -->
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1e293b" text-anchor="middle">Configuration Flow</text>
  
  <!-- Step 1 -->
  <rect x="50" y="80" width="150" height="120" fill="url(#step1Grad)" rx="10"/>
  <text x="125" y="110" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">1</text>
  <text x="125" y="135" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle">Pull Image</text>
  <text x="125" y="155" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">docker pull</text>
  <text x="125" y="170" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">agenticspace-</text>
  <text x="125" y="182" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">sandbox:latest</text>
  
  <!-- Arrow 1-2 -->
  <path d="M 200 140 L 250 140" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Step 2 -->
  <rect x="250" y="80" width="150" height="120" fill="url(#step2Grad)" rx="10"/>
  <text x="325" y="110" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">2</text>
  <text x="325" y="135" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle">Edit Config</text>
  <text x="325" y="155" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">openclaw.json</text>
  <text x="325" y="170" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">Add sandbox</text>
  <text x="325" y="182" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">block</text>
  
  <!-- Arrow 2-3 -->
  <path d="M 400 140 L 450 140" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Step 3 -->
  <rect x="450" y="80" width="150" height="120" fill="url(#step3Grad)" rx="10"/>
  <text x="525" y="110" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">3</text>
  <text x="525" y="135" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle">Configure</text>
  <text x="525" y="155" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">Set paths</text>
  <text x="525" y="170" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">Configure</text>
  <text x="525" y="182" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">PUID/PGID</text>
  
  <!-- Arrow 3-4 -->
  <path d="M 600 140 L 650 140" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Step 4 -->
  <rect x="650" y="80" width="100" height="120" fill="url(#step4Grad)" rx="10"/>
  <text x="700" y="110" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">4</text>
  <text x="700" y="135" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle">Test</text>
  <text x="700" y="155" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">Verify</text>
  <text x="700" y="170" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">tools</text>
  <text x="700" y="182" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">work</text>
  
  <!-- Configuration details -->
  <rect x="50" y="230" width="700" height="250" fill="white" stroke="#e2e8f0" stroke-width="1" rx="10"/>
  <text x="400" y="260" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1e293b" text-anchor="middle">Key Configuration Parameters</text>
  
  <!-- Config items -->
  <rect x="80" y="280" width="300" height="40" fill="#f1f5f9" rx="5"/>
  <text x="100" y="300" font-family="Arial, sans-serif" font-size="11" fill="#334155" font-weight="bold">mode: "all"</text>
  <text x="230" y="300" font-family="Arial, sans-serif" font-size="10" fill="#64748b">All commands in sandbox</text>
  
  <rect x="420" y="280" width="300" height="40" fill="#f1f5f9" rx="5"/>
  <text x="440" y="300" font-family="Arial, sans-serif" font-size="11" fill="#334155" font-weight="bold">scope: "agent"</text>
  <text x="540" y="300" font-family="Arial, sans-serif" font-size="10" fill="#64748b">Isolated per agent</text>
  
  <rect x="80" y="330" width="300" height="40" fill="#f1f5f9" rx="5"/>
  <text x="100" y="350" font-family="Arial, sans-serif" font-size="11" fill="#334155" font-weight="bold">workspaceAccess: "rw"</text>
  <text x="250" y="350" font-family="Arial, sans-serif" font-size="10" fill="#64748b">Read/write access</text>
  
  <rect x="420" y="330" width="300" height="40" fill="#f1f5f9" rx="5"/>
  <text x="440" y="350" font-family="Arial, sans-serif" font-size="11" fill="#334155" font-weight="bold">backend: "docker"</text>
  <text x="530" y="350" font-family="Arial, sans-serif" font-size="10" fill="#64748b">Docker isolation</text>
  
  <rect x="80" y="380" width="640" height="80" fill="#fef3c7" stroke="#f59e0b" stroke-width="1" rx="5"/>
  <text x="400" y="405" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#92400e" text-anchor="middle">Important: Replace SEU_USUARIO with your actual username</text>
  <text x="400" y="425" font-family="Arial, sans-serif" font-size="10" fill="#92400e" text-anchor="middle">Example: /home/carlosdelfino/workspace/openclaw-workspace/skills:/skills:ro</text>
  <text x="400" y="445" font-family="Arial, sans-serif" font-size="10" fill="#92400e" text-anchor="middle">Use 'id -u' and 'id -g' to get your PUID and PGID values</text>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
  </defs>
</svg>
